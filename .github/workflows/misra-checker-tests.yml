# .github/workflows/misra-checker-tests.yml
name: MISRA Checker — Unit Tests

on:
  push:
    paths:
      - "misra_checker.py"
      - "tests/test_misra_checker.py"
  pull_request:
    paths:
      - "misra_checker.py"
      - "tests/test_misra_checker.py"

jobs:
  misra-checker-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install libclang (AST-based checks)
        run: pip install libclang

      - name: Run unit tests
        run: python -m unittest tests/test_misra_checker.py -v
